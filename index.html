<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Digital Bank</title>
    <style>
        /* CSS STYLING */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .balance-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .balance-card #balance {
            font-size: 32px;
            font-weight: 700;
        }

        /* Main Content Grid */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Cards/Sections */
        .section-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
        }

        .section-card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #1e3c72;
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2a5298;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-deposit {
            background-color: #10b981;
            color: white;
        }

        .btn-deposit:hover {
            background-color: #059669;
        }

        .btn-withdraw {
            background-color: #ef4444;
            color: white;
        }

        .btn-withdraw:hover {
            background-color: #dc2626;
        }

        /* History List */
        .transaction-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 15px;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .type-deposit {
            color: #10b981;
            font-weight: 600;
        }

        .type-withdraw {
            color: #ef4444;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding-top: 40px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div>
                <h1>Apex Digital Bank</h1>
                <p>Welcome back, User</p>
            </div>
            <div class="balance-card">
                <h3>Current Balance</h3>
                <div id="balance">$1,000.00</div>
            </div>
        </header>

        <main class="main-content">
            <section class="section-card">
                <h2>Make a Transaction</h2>
                
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01">
                </div>

                <div class="btn-group">
                    <button class="btn-deposit" id="depositBtn">Deposit</button>
                    <button class="btn-withdraw" id="withdrawBtn">Withdraw</button>
                </div>
            </section>

            <section class="section-card">
                <h2>Transaction History</h2>
                <ul id="transactionList" class="transaction-list">
                    <p id="emptyState" class="empty-state">No recent transactions</p>
                </ul>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
